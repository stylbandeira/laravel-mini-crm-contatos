services:
  app:
    build: .
    container_name: laravel-mini-crm-app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - laravel

  queue:
    build: .
    container_name: queue
    volumes:
      - .:/var/www/html
    command: php artisan queue:work redis --tries=3
    depends_on:
      - app
      - redis
    restart: unless-stopped
    networks:
    - laravel

  reverb:
    build: .
    container_name: reverb
    volumes:
      - .:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8081"
    depends_on:
      - app
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
    - laravel

  db:
    image: mysql:8.0
    container_name: laravel-mini-crm-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel-mini-crm-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - laravel

  node:
    image: node:22
    container_name: laravel-mini-crm-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - laravel

networks:
  laravel:

volumes:
  dbdata:
